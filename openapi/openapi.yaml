openapi: 3.0.3

info:
  title: AWS Serverless Items API
  version: 1.0.0
  description: >
    API contract for the item-management backend implemented in this
    repository. API Gateway deployment is defined by Terraform; this OpenAPI
    document is used for documentation and automated contract validation.

servers:
  - url: https://example.execute-api.region.amazonaws.com/dev
    description: Neutral example endpoint for the Terraform-managed dev stage

security: []

paths:
  /items:
    post:
      operationId: createItem
      summary: Create an item
      description: >
        Creates an item with a generated UUID and version 1. The caller must
        provide an Idempotency-Key header. Replaying the same key with the same
        normalized payload returns the original 201 response. Reusing the key
        with another payload, or while the original request is still in
        progress, returns 409 Conflict.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemRequest"
            example:
              name: Laptop charger
      responses:
        "201":
          description: >
            Item created, or the original create response replayed for the same
            idempotency key and payload.
          headers:
            Idempotency-Replayed:
              description: >
                Present with value true only when the stored response is
                returned as an idempotent replay.
              schema:
                type: string
                enum:
                  - "true"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateItemResponse"
              example:
                message: Item created
                id: 00000000-0000-4000-8000-000000000001
                version: 1

        "400":
          $ref: "#/components/responses/CreateValidationError"

        "409":
          $ref: "#/components/responses/CreateConflictError"

        "500":
          description: Safe response for an internal create failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Failed to create item

  /items/{id}:
    get:
      operationId: getItem
      summary: Get an item
      description: Retrieves an item by UUID.
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "200":
          description: Item found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
              example:
                id: 00000000-0000-4000-8000-000000000001
                name: Laptop charger
                createdAt: "2026-05-14T10:00:00.000Z"
                version: 1

        "400":
          $ref: "#/components/responses/ItemIdValidationError"

        "404":
          $ref: "#/components/responses/NotFoundError"

        "500":
          description: Safe response for an internal read failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Failed to fetch item

    put:
      operationId: updateItem
      summary: Update an item
      description: >
        Updates an item using version-based optimistic locking. The request
        body contains the version that the caller expects to be current. A
        successful update increments the version by 1. A stale version returns
        409 Conflict when the item still exists. If the item is missing before
        or after the conditional update, the response is 404 Not Found.
      parameters:
        - $ref: "#/components/parameters/ItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItemRequest"
            example:
              name: Laptop charger - spare
              version: 1
      responses:
        "200":
          description: Item updated and version incremented.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
              example:
                id: 00000000-0000-4000-8000-000000000001
                name: Laptop charger - spare
                createdAt: "2026-05-14T10:00:00.000Z"
                version: 2

        "400":
          $ref: "#/components/responses/UpdateValidationError"

        "404":
          $ref: "#/components/responses/NotFoundError"

        "409":
          $ref: "#/components/responses/VersionConflictError"

        "500":
          description: Safe response for an internal update failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Failed to update item

    delete:
      operationId: deleteItem
      summary: Delete an item
      description: >
        Deletes an item by UUID. The current implementation does not require or
        accept a request body or item version.
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "200":
          description: Item deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteItemResponse"
              example:
                message: Item deleted
                id: 00000000-0000-4000-8000-000000000001

        "400":
          $ref: "#/components/responses/ItemIdValidationError"

        "404":
          $ref: "#/components/responses/NotFoundError"

        "500":
          description: Safe response for an internal delete failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Failed to delete item

components:
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: >
        Client-generated key used to make item creation safe to retry. Valid
        keys contain 8 to 128 letters, digits, hyphens, underscores, periods,
        or colons. Header lookup is case-insensitive.
      schema:
        type: string
        minLength: 8
        maxLength: 128
        pattern: ^[A-Za-z0-9._:-]{8,128}$
      example: item-create:00000001

    ItemId:
      name: id
      in: path
      required: true
      description: Item UUID.
      schema:
        type: string
        format: uuid
      example: 00000000-0000-4000-8000-000000000001

  responses:
    CreateValidationError:
      description: Create request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missingIdempotencyKey:
              summary: Missing idempotency key
              value:
                error: Idempotency-Key header is required

            invalidIdempotencyKey:
              summary: Invalid idempotency key
              value:
                error: Idempotency-Key header is invalid

            missingBody:
              summary: Missing request body
              value:
                error: Request body is required

            invalidJson:
              summary: Invalid JSON body
              value:
                error: Request body must be valid JSON

            invalidName:
              summary: Invalid item name
              value:
                error: Name cannot be empty

    ItemIdValidationError:
      description: Item ID validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Item id must be a valid UUID

    UpdateValidationError:
      description: Update request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidId:
              summary: Invalid item ID
              value:
                error: Item id must be a valid UUID

            missingBody:
              summary: Missing request body
              value:
                error: Request body is required

            invalidJson:
              summary: Invalid JSON body
              value:
                error: Request body must be valid JSON

            missingName:
              summary: Missing item name
              value:
                error: Name is required

            missingVersion:
              summary: Missing item version
              value:
                error: Version is required

            invalidVersion:
              summary: Invalid item version
              value:
                error: Version must be a positive integer

    NotFoundError:
      description: Item was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Item not found

    CreateConflictError:
      description: >
        The idempotency key conflicts with another request, the original
        request is still in progress, or the generated item ID already exists.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            differentPayload:
              summary: Key reused with another payload
              value:
                error: Idempotency key was already used with a different request

            inProgress:
              summary: Original request still in progress
              value:
                error: Request with this idempotency key is already in progress

            existingItem:
              summary: Generated item ID already exists
              value:
                error: Item already exists

    VersionConflictError:
      description: Submitted version does not match the current item version.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Item version conflict

  schemas:
    CreateItemRequest:
      type: object
      additionalProperties: true
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: >
            Item name. Surrounding whitespace is trimmed before validation and
            storage. Whitespace-only names are rejected. Additional request
            properties are ignored by runtime validation.
      example:
        name: Laptop charger

    UpdateItemRequest:
      type: object
      additionalProperties: true
      required:
        - name
        - version
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: >
            Updated item name. Surrounding whitespace is trimmed before
            validation and storage. Whitespace-only names are rejected.
            Additional request properties are ignored by runtime validation.

        version:
          type: integer
          minimum: 1
          description: Current item version expected by the caller.
      example:
        name: Laptop charger - spare
        version: 1

    CreateItemResponse:
      type: object
      additionalProperties: false
      required:
        - message
        - id
        - version
      properties:
        message:
          type: string
          enum:
            - Item created

        id:
          type: string
          format: uuid

        version:
          type: integer
          minimum: 1
      example:
        message: Item created
        id: 00000000-0000-4000-8000-000000000001
        version: 1

    DeleteItemResponse:
      type: object
      additionalProperties: false
      required:
        - message
        - id
      properties:
        message:
          type: string
          enum:
            - Item deleted

        id:
          type: string
          format: uuid
      example:
        message: Item deleted
        id: 00000000-0000-4000-8000-000000000001

    Item:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - createdAt
        - version
      properties:
        id:
          type: string
          format: uuid

        name:
          type: string
          minLength: 1
          maxLength: 100

        createdAt:
          type: string
          format: date-time

        version:
          type: integer
          minimum: 1
      example:
        id: 00000000-0000-4000-8000-000000000001
        name: Laptop charger
        createdAt: "2026-05-14T10:00:00.000Z"
        version: 1

    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: string
          minLength: 1
      example:
        error: Item not found
