openapi: 3.0.3
info:
  title: AWS Serverless Items API
  version: 1.0.0
  description: >
    Contract for the currently implemented item API. This document describes the
    Lambda/API Gateway behavior in this repository and is not the API Gateway
    deployment source.
servers:
  - url: https://example.execute-api.region.amazonaws.com/dev
    description: Example deployment endpoint placeholder
paths:
  /items:
    post:
      operationId: createItem
      summary: Create an item
      description: >
        Creates an item with a generated UUID and version 1. The request requires
        a client supplied Idempotency-Key header. Replaying the same key with the
        same normalized payload returns the original 201 response and
        Idempotency-Replayed: true. Reusing the key with a different payload, or
        while the original request is still in progress, returns 409. Expired
        in-progress reservations may be recovered by the same key and payload
        without exposing reservation, fingerprint, table, transaction, or lease
        internals to clients.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemRequest"
            examples:
              create:
                value:
                  name: Laptop charger
      responses:
        "201":
          description: Item created, or original create response replayed for the same key and payload.
          headers:
            Idempotency-Replayed:
              description: Present with value true only when this response is an idempotent replay.
              schema:
                type: string
                enum: ["true"]
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateItemResponse"
              examples:
                created:
                  value:
                    message: Item created
                    id: 00000000-0000-4000-8000-000000000001
                    version: 1
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: Idempotency conflict, in-progress request conflict, or generated item ID collision.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                differentPayload:
                  value:
                    error: Idempotency key was already used with a different request
                inProgress:
                  value:
                    error: Request with this idempotency key is already in progress
                existingItem:
                  value:
                    error: Item already exists
        "500":
          description: Safe create failure response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Failed to create item
  /items/{id}:
    get:
      operationId: getItem
      summary: Get an item
      description: Fetches one item by UUID path parameter.
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "200":
          description: Item found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
              example:
                id: 00000000-0000-4000-8000-000000000001
                name: Laptop charger
                createdAt: "2026-05-14T10:00:00.000Z"
                version: 1
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          description: Safe fetch failure response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Failed to fetch item
    put:
      operationId: updateItem
      summary: Update an item
      description: >
        Updates an item by UUID using optimistic locking. The client supplies the
        expected positive integer version in the JSON request body, not in an
        If-Match or ETag header. A successful update increments version by 1.
        Stale versions return 409 when the item still exists; if the item is
        missing before or after the conditional update, the response is 404.
      parameters:
        - $ref: "#/components/parameters/ItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItemRequest"
            examples:
              update:
                value:
                  name: Laptop charger - spare
                  version: 1
      responses:
        "200":
          description: Item updated with an incremented version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
              example:
                id: 00000000-0000-4000-8000-000000000001
                name: Laptop charger - spare
                createdAt: "2026-05-14T10:00:00.000Z"
                version: 2
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/VersionConflictError"
        "500":
          description: Safe update failure response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Failed to update item
    delete:
      operationId: deleteItem
      summary: Delete an item
      description: Deletes an item by UUID. The current implementation does not require or accept a version body.
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "200":
          description: Item deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteItemResponse"
              example:
                message: Item deleted
                id: 00000000-0000-4000-8000-000000000001
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          description: Safe delete failure response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Failed to delete item
components:
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: >
        Client-generated idempotency key. Header lookup is case-insensitive.
        Valid keys are 8 to 128 characters using letters, digits, hyphen,
        underscore, period, or colon.
      schema:
        type: string
        minLength: 8
        maxLength: 128
        pattern: ^[A-Za-z0-9._:-]{8,128}$
      example: item-create:00000001
    ItemId:
      name: id
      in: path
      required: true
      description: Item UUID.
      schema:
        type: string
        format: uuid
      example: 00000000-0000-4000-8000-000000000001
  responses:
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidJson:
              value:
                error: Request body must be valid JSON
            invalidId:
              value:
                error: Item id must be a valid UUID
    NotFoundError:
      description: Item was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Item not found
    VersionConflictError:
      description: Submitted version does not match the current item version.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Item version conflict
  schemas:
    CreateItemRequest:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Item name. Runtime validation trims surrounding whitespace before storage.
      example:
        name: Laptop charger
    UpdateItemRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - version
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Item name. Runtime validation trims surrounding whitespace before storage.
        version:
          type: integer
          minimum: 1
          description: Expected current item version supplied by the client.
      example:
        name: Laptop charger - spare
        version: 1
    CreateItemResponse:
      type: object
      additionalProperties: false
      required:
        - message
        - id
        - version
      properties:
        message:
          type: string
          enum: [Item created]
        id:
          type: string
          format: uuid
        version:
          type: integer
          minimum: 1
      example:
        message: Item created
        id: 00000000-0000-4000-8000-000000000001
        version: 1
    DeleteItemResponse:
      type: object
      additionalProperties: false
      required:
        - message
        - id
      properties:
        message:
          type: string
          enum: [Item deleted]
        id:
          type: string
          format: uuid
      example:
        message: Item deleted
        id: 00000000-0000-4000-8000-000000000001
    Item:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - createdAt
        - version
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 100
        createdAt:
          type: string
          format: date-time
        version:
          type: integer
          minimum: 1
      example:
        id: 00000000-0000-4000-8000-000000000001
        name: Laptop charger
        createdAt: "2026-05-14T10:00:00.000Z"
        version: 1
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: string
          minLength: 1
      example:
        error: Item not found
